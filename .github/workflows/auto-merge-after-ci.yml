# После успешного прогона CI автоматически сливает открытый PR с той же веткой (squash).
# Нужно: в правилах ветки main — 0 required approvals (или merge всё равно ждёт approve).
# Vercel: деплой срабатывает сам при push в main после merge.

name: Auto-merge after CI

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: write
  pull-requests: write

jobs:
  merge-if-green:
    runs-on: ubuntu-latest
    if: >-
      github.event.workflow_run.conclusion == 'success'
      && github.event.workflow_run.event == 'pull_request'
      && github.event.workflow_run.head_repository.full_name == github.repository
    steps:
      - name: Merge open PR for this branch
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const branch = context.payload.workflow_run.head_branch;
            const { data: prs } = await github.rest.pulls.list({
              owner,
              repo,
              state: "open",
              head: `${owner}:${branch}`,
              per_page: 5,
            });
            if (!prs.length) {
              core.info(`No open PR for head ${owner}:${branch}`);
              return;
            }
            const pr = prs[0];
            core.info(`Merging PR #${pr.number} (${pr.title})`);
            await github.rest.pulls.merge({
              owner,
              repo,
              pull_number: pr.number,
              merge_method: "squash",
            });
